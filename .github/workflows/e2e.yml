name: e2e.yml
on: [push]

jobs:
  Selenium-Website-Tests:
    runs-on: ubuntu-latest
    name: Selenium — Website Tests (300)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: npm ci || npm install

      - name: Install Web Dependencies
        run: npx expo install react-dom react-native-web @expo/metro-runtime

      - name: Build Web Application
        run: npx expo export -p web

      - name: Start Web Server (Background)
        run: |
          npx -y serve dist -p 8081 &
          sleep 10
          sleep 5
          curl http://localhost:8081

      - name: Install E2E Test Dependencies
        working-directory: ./E2E_Tests
        run: npm install

      - name: Run E2E Tests
        working-directory: ./E2E_Tests
        run: npm run test:web
        env:
          TEST_BASE_URL: http://localhost:8081
          REPORT_FILENAME: Web_Test_Report.xlsx
          REPORT_SHEETNAME: Web Test Report

      - name: Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Test-Report
          path: ./E2E_Tests/Web_Test_Report.xlsx

      - name: Upload Web Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ./dist

  Appium-Android-Tests:
    runs-on: ubuntu-latest
    name: Appium — Android Tests (300)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Test Dependencies
        working-directory: ./E2E_Tests
        run: npm ci || npm install
      - name: Run App Tests
        working-directory: ./E2E_Tests
        run: npm run test:app
        env:
          REPORT_FILENAME: Appium_Test_Report.xlsx
          REPORT_SHEETNAME: Appium Test Report

      - name: Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Test-Report
          path: ./E2E_Tests/Appium_Test_Report.xlsx

  Backend-Vulnerability-Tests:
    runs-on: ubuntu-latest
    name: Backend — Vulnerability Tests (300)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Test Dependencies
        working-directory: ./E2E_Tests
        run: npm ci || npm install
      - name: Run Vuln Tests
        working-directory: ./E2E_Tests
        run: npm run test:api
        env:
          REPORT_FILENAME: Backend_Vulnerability_Test_Report.xlsx
          REPORT_SHEETNAME: Backend Vulnerability Report

      - name: Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Backend-Vulnerability-Report
          path: ./E2E_Tests/Backend_Vulnerability_Test_Report.xlsx

  Validation-Tests:
    runs-on: ubuntu-latest
    name: Validation Tests (300)
    steps:
      - name: Stub execution
        run: echo "Validation tests would execute here."

  Deployment-Status:
    runs-on: ubuntu-latest
    name: Deployment Status (300)
    steps:
      - name: Stub execution
        run: echo "Deployment status checks would execute here."

  Backend-Load-Tests:
    runs-on: ubuntu-latest
    name: Backend — Load Tests (300)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Test Dependencies
        working-directory: ./E2E_Tests
        run: npm ci || npm install
      - name: Run Load Tests
        working-directory: ./E2E_Tests
        run: npm run test:load
        env:
          REPORT_FILENAME: Backend_Load_Test_Report.xlsx
          REPORT_SHEETNAME: Backend Load Report

      - name: Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Backend-Load-Report
          path: ./E2E_Tests/Backend_Load_Test_Report.xlsx

  Compile-Master-Report-Deploy:
    runs-on: ubuntu-latest
    name: Compile Master Report & Deploy
    needs: [Selenium-Website-Tests, Appium-Android-Tests, Backend-Vulnerability-Tests, Validation-Tests, Deployment-Status, Backend-Load-Tests]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./dist

      - name: Download Selenium Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: Selenium-Test-Report
          path: ./dist/reports

      - name: Download Appium Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: Appium-Test-Report
          path: ./dist/reports

      - name: Download API Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: Backend-Vulnerability-Report
          path: ./dist/reports

      - name: Download Load Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: Backend-Load-Report
          path: ./dist/reports

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
