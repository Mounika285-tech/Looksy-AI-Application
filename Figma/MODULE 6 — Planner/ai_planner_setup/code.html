<script>
        function selectOption(element) {
            // Remove active classes from all cards
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('ring-2', 'ring-secondary', 'bg-secondary-container/20');
                card.querySelector('.selection-indicator').classList.add('opacity-0');
            });
            
            // Add active class to clicked card
            element.classList.add('ring-2', 'ring-secondary', 'bg-secondary-container/20');
            element.querySelector('.selection-indicator').classList.remove('opacity-0');
            
            // Subtle Haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Initialize first item as selected
        window.onload = () => {
            const firstOption = document.querySelector('.option-card');
            if (firstOption) selectOption(firstOption);
        };
    </script>
