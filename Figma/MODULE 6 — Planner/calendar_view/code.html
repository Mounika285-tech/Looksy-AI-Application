<script>
                const datesContainer = document.getElementById('calendar-dates');
                const markedDates = [5, 12, 13, 14, 21, 25, 28];
                const selectedDate = 14;

                for (let i = 1; i <= 31; i++) {
                    const dateBtn = document.createElement('div');
                    dateBtn.className = `flex flex-col items-center justify-center h-12 relative cursor-pointer group`;
                    
                    const isSelected = i === selectedDate;
                    const isMarked = markedDates.includes(i);

                    dateBtn.innerHTML = `
                        <span class="z-10 font-body-md text-body-md ${isSelected ? 'text-on-secondary' : 'text-on-surface'} transition-colors">${i}</span>
                        ${isSelected ? '<div class="absolute inset-0 m-auto w-10 h-10 bg-secondary rounded-full -z-0"></div>' : ''}
                        ${isMarked && !isSelected ? '<div class="absolute bottom-0 w-1 h-1 bg-tertiary rounded-full"></div>' : ''}
                    `;
                    
                    dateBtn.onclick = () => updatePreview(i);
                    datesContainer.appendChild(dateBtn);
                }
            </script>

<script>
        function updatePreview(day) {
            const preview = document.getElementById('outfit-preview');
            const markedDates = [5, 12, 13, 14, 21, 25, 28];
            
            // Re-render calendar highlight logic (simple swap for demo)
            const allDates = document.getElementById('calendar-dates').children;
            for(let i = 0; i < allDates.length; i++) {
                const dateElem = allDates[i];
                const text = dateElem.querySelector('span');
                if(!text) continue;
                
                const val = parseInt(text.innerText);
                const bg = dateElem.querySelector('.bg-secondary');
                
                if(val === day) {
                    if(!bg) {
                        const newBg = document.createElement('div');
                        newBg.className = "absolute inset-0 m-auto w-10 h-10 bg-secondary rounded-full -z-0";
                        dateElem.appendChild(newBg);
                        text.classList.remove('text-on-surface');
                        text.classList.add('text-on-secondary');
                    }
                } else {
                    if(bg) bg.remove();
                    text.classList.add('text-on-surface');
                    text.classList.remove('text-on-secondary');
                }
            }

            // Show/Hide preview card
            if (markedDates.includes(day)) {
                preview.style.transform = 'translateY(0)';
                preview.style.opacity = '1';
                // Update day text
                preview.querySelector('.text-tertiary').innerText = `PLANNED FOR OCT ${day}`;
            } else {
                preview.style.transform = 'translateY(20px)';
                preview.style.opacity = '0';
            }
        }
    </script>
