<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            background-color: #fff8f4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(255, 250, 249, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 180, 184, 0.2);
        }
        .fade-in-up {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar (Shell Logic: Suppressed Back/Skip for Success Screen) -->
<header class="fixed top-0 left-0 w-full z-50 bg-background/80 backdrop-blur-md px-margin-mobile py-4 md:px-margin-desktop">
<div class="flex justify-center items-center w-full">
<span class="font-display-lg text-headline-md tracking-widest text-primary uppercase">VESTIAIRE</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-[1440px] px-margin-mobile md:px-margin-desktop py-stack-lg mt-16 overflow-hidden">
<!-- Celebration Container -->
<div class="w-full max-w-lg flex flex-col items-center text-center">
<!-- Centered Success Illustration -->
<div class="relative w-full aspect-square max-w-[320px] md:max-w-[400px] mb-stack-md flex items-center justify-center float-slow fade-in-up" style="animation-delay: 0.2s;">
<!-- Decorative Glass Halo -->
<div class="absolute inset-0 bg-tertiary-fixed-dim/20 rounded-full blur-[80px]"></div>
<div class="relative z-10 glass-card p-gutter rounded-xl overflow-hidden shadow-xl shadow-tertiary/5">
<img alt="Success Illustration" class="w-full h-full object-cover rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAM0nt9p6Lt5_eEyZVAXESmXMPl8mruxPKSIbe4F4svoRS0Iwm_JZfdqEE4mJ0EfvBGazX-NWxL8IJiSJbImEGOaacHBLVSPN2r1FN39s365YSRxrJE9mzzTV2jn757z2gHUOtdhPDB7WZNpjgkg2tWk1nAQwgX3jiMJ7NE5x1r28qT1DaN0s3fH7kGnFTPmVMDQVr9fn8LgB-LjMLHIszRE_lfhtP6WgBDFcuJ84TJyaBwYxmbAJj2OZW6G7zyRp0j2hURGOE-Rss"/>
</div>
<!-- Floating Accents -->
<div class="absolute -top-4 -right-4 w-12 h-12 glass-card rounded-full flex items-center justify-center text-tertiary fade-in-up" style="animation-delay: 0.8s;">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
<div class="absolute -bottom-2 -left-6 w-10 h-10 glass-card rounded-full flex items-center justify-center text-secondary-fixed-dim fade-in-up" style="animation-delay: 1s;">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Content Hierarchy -->
<div class="space-y-stack-sm fade-in-up" style="animation-delay: 0.4s;">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background">
                    You're All Set!
                </h1>
<p class="font-body-lg text-body-lg text-outline max-w-xs mx-auto">
                    Your personal wardrobe assistant is ready to curate your first looks.
                </p>
</div>
<!-- Action Area -->
<div class="mt-stack-lg w-full flex flex-col items-center space-y-gutter fade-in-up" style="animation-delay: 0.6s;">
<!-- Primary Action Button -->
<button class="w-full md:w-auto px-12 py-5 bg-tertiary text-on-tertiary font-label-md text-label-md rounded-full shadow-lg shadow-tertiary/20 hover:scale-105 active:scale-95 transition-all duration-300">
                    Explore Your Wardrobe
                </button>
<!-- Secondary Support (Optional hint) -->
<p class="font-label-sm text-label-sm text-outline-variant uppercase tracking-widest">
                    Your journey to intentional style begins now
                </p>
</div>
</div>
</main>
<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-low to-transparent pointer-events-none opacity-60"></div>
<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button');
            
            button.addEventListener('mouseover', () => {
                // Subtle haptic feel simulation for web
                console.log('Hover state: Ready to explore');
            });

            // Sparkle follow effect (Subtle atmospheric micro-interaction)
            document.addEventListener('mousemove', (e) => {
                if (Math.random() > 0.95) {
                    createSparkle(e.clientX, e.clientY);
                }
            });

            function createSparkle(x, y) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = '<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-size: 8px;">sparkles</span>';
                sparkle.style.position = 'fixed';
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.opacity = '0.6';
                sparkle.classList.add('fade-in-up');
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 1000);
            }
        });
    </script>
</body></html>
