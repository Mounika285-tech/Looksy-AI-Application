<script>
        function toggleSelection(el) {
            el.classList.toggle('style-card-active');
            el.classList.toggle('glass-card');
            
            // Subtle haptic feel
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        function toggleColor(el) {
            // Unselect others if desired, or allow multiple
            // For this design, let's allow multiple for a rich profile
            el.classList.toggle('active');
        }

        // Atmosphere: Subtle parallax or fade-in could go here
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        });
    </script>
