<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VESTIAIRE - Profile Setup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#eeb9bd",
                    "surface-container-high": "#f0e7df",
                    "on-background": "#1f1b17",
                    "on-tertiary-container": "#94686c",
                    "outline-variant": "#c9c6bd",
                    "tertiary-fixed": "#ffdadc",
                    "secondary-fixed": "#fbdbdb",
                    "on-tertiary-fixed-variant": "#623c40",
                    "surface": "#fff8f4",
                    "secondary-fixed-dim": "#debfbf",
                    "secondary-container": "#f8d8d8",
                    "tertiary": "#7c5357",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#fffaf9",
                    "on-surface-variant": "#484740",
                    "on-secondary-fixed-variant": "#574142",
                    "surface-bright": "#fff8f4",
                    "secondary": "#705959",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#281717",
                    "on-secondary": "#ffffff",
                    "primary": "#605e58",
                    "outline": "#79776f",
                    "surface-container-low": "#fbf2eb",
                    "surface-variant": "#eae1da",
                    "inverse-primary": "#c9c6be",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#755d5d",
                    "primary-container": "#fffbf2",
                    "background": "#fff8f4",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#e6e2d9",
                    "on-surface": "#1f1b17",
                    "inverse-surface": "#34302b",
                    "surface-tint": "#605e58",
                    "surface-container": "#f5ece5",
                    "error": "#ba1a1a",
                    "surface-dim": "#e1d8d2",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#1c1c17",
                    "surface-container-highest": "#eae1da",
                    "primary-fixed-dim": "#c9c6be",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#f8efe8",
                    "on-tertiary-fixed": "#301216",
                    "on-primary-fixed-variant": "#484741",
                    "on-primary-container": "#75736c"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-gap": "32px",
                    "stack-lg": "40px",
                    "gutter": "16px",
                    "stack-md": "16px",
                    "margin-desktop": "64px",
                    "margin-mobile": "24px",
                    "unit": "4px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "body-lg": ["DM Sans"],
                    "headline-lg-mobile": ["Playfair Display"],
                    "display-lg": ["Playfair Display"],
                    "label-sm": ["DM Sans"],
                    "headline-lg": ["Playfair Display"],
                    "label-md": ["DM Sans"],
                    "headline-md": ["Playfair Display"],
                    "body-md": ["DM Sans"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 250, 249, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 180, 184, 0.2);
        }
        .input-focus-pill:focus-within {
            background-color: theme('colors.primary-container');
            border-radius: 9999px;
            box-shadow: 0 10px 30px -10px rgba(124, 83, 87, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed w-full top-0 left-0 bg-background/80 backdrop-blur-md z-50 flex justify-between items-center px-margin-mobile py-4 w-full">
<button class="text-primary hover:opacity-70 transition-opacity active:scale-95 transition-transform flex items-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg text-headline-md tracking-widest text-primary dark:text-primary-fixed">VESTIAIRE</h1>
<button class="text-outline font-label-md hover:opacity-70 transition-opacity active:scale-95 transition-transform">
            Skip
        </button>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 pb-12 px-margin-mobile max-w-lg mx-auto w-full">
<section class="mb-stack-lg text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-2">Personalize Your Profile</h2>
<p class="font-body-md text-on-surface-variant">Tell us a bit about yourself to tailor your experience.</p>
</section>
<!-- Profile Image Upload Section -->
<section class="flex flex-col items-center mb-stack-lg">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden ring-4 ring-tertiary-fixed shadow-xl transition-transform hover:scale-105 duration-300">
<img alt="Profile Preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbxrIUyTcNdAeyzciO0GamT5arvTvfNt6yOW0kYlZ2bPgDMsaGTIvAXmd8RP2Ac5wuBCoZo7aOqJ0MQDVAKajh6RSkACDfSgBXnmdli_AQV5TDEznNWSpfGV34rdLVeX8YF5LmBDDAPZJR5UnJWCqG_WwG8ltPqUWp2XJ_3IDlFEQbkRF8hwoWlXUNUYZsSugzRt4o6UKJCcbxMZONMAc1fQ_hPtLwSzCdNvROOXHPUsZ157pIzjCkluOH5pi41fZP6V1zsZwtY0Y"/>
</div>
<label class="absolute bottom-0 right-0 bg-tertiary text-on-tertiary w-10 h-10 rounded-full flex items-center justify-center shadow-lg cursor-pointer hover:bg-on-tertiary-container transition-colors" for="photo-upload">
<span class="material-symbols-outlined">edit</span>
</label>
<input class="hidden" id="photo-upload" type="file"/>
</div>
<button class="mt-4 font-label-md text-tertiary tracking-wide uppercase hover:underline">Change Photo</button>
</section>
<!-- Form Elements -->
<form class="space-y-stack-lg">
<!-- Full Name -->
<div class="input-focus-pill group flex flex-col px-4 py-2 border-b border-tertiary transition-all duration-300">
<label class="font-label-sm text-outline-variant group-focus-within:text-tertiary transition-colors" for="full-name">Full Name</label>
<input class="bg-transparent border-none focus:ring-0 p-0 font-body-lg text-on-background placeholder:text-outline/40 h-10" id="full-name" placeholder="E.g. Julianne Moore" type="text"/>
</div>
<!-- Age -->
<div class="input-focus-pill group flex flex-col px-4 py-2 border-b border-tertiary transition-all duration-300">
<label class="font-label-sm text-outline-variant group-focus-within:text-tertiary transition-colors" for="age">Age</label>
<input class="bg-transparent border-none focus:ring-0 p-0 font-body-lg text-on-background placeholder:text-outline/40 h-10" id="age" placeholder="28" type="number"/>
</div>
<!-- Gender Toggle -->
<div class="space-y-stack-sm">
<p class="font-label-sm text-outline-variant ml-4">Gender Selection</p>
<div class="glass-card flex p-1 rounded-full w-full">
<button class="flex-1 py-3 rounded-full font-label-md transition-all duration-300 bg-tertiary text-on-tertiary" id="btn-male" onclick="toggleGender('male')" type="button">
                        Male
                    </button>
<button class="flex-1 py-3 rounded-full font-label-md transition-all duration-300 text-on-surface-variant hover:bg-tertiary-fixed/30" id="btn-female" onclick="toggleGender('female')" type="button">
                        Female
                    </button>
</div>
</div>
<!-- Action Area -->
<div class="pt-8">
<button class="w-full bg-tertiary text-on-tertiary py-5 rounded-full font-label-md text-body-lg tracking-widest shadow-lg shadow-tertiary/20 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 active:scale-95" type="submit">
                    Continue
                </button>
<p class="text-center mt-6 font-label-sm text-outline">
                    You can change these settings later in your profile.
                </p>
</div>
</form>
</main>
<!-- Visual Accents: Soft Blush Orbs -->
<div class="fixed -z-10 top-1/4 -right-20 w-80 h-80 bg-tertiary-fixed/30 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -z-10 bottom-0 -left-20 w-96 h-96 bg-secondary-fixed/20 rounded-full blur-[120px] pointer-events-none"></div>
<script>
        function toggleGender(gender) {
            const btnMale = document.getElementById('btn-male');
            const btnFemale = document.getElementById('btn-female');
            
            if (gender === 'male') {
                btnMale.classList.add('bg-tertiary', 'text-on-tertiary');
                btnMale.classList.remove('text-on-surface-variant', 'hover:bg-tertiary-fixed/30');
                
                btnFemale.classList.remove('bg-tertiary', 'text-on-tertiary');
                btnFemale.classList.add('text-on-surface-variant', 'hover:bg-tertiary-fixed/30');
            } else {
                btnFemale.classList.add('bg-tertiary', 'text-on-tertiary');
                btnFemale.classList.remove('text-on-surface-variant', 'hover:bg-tertiary-fixed/30');
                
                btnMale.classList.remove('bg-tertiary', 'text-on-tertiary');
                btnMale.classList.add('text-on-surface-variant', 'hover:bg-tertiary-fixed/30');
            }
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('main > *');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        });
    </script>
</body></html>
